<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Explore Anshul Mandekar's portfolio as an interactive 3D world. Navigate districts, discover projects, and fly between experiences.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7c83e8;
      --accent-glow: rgba(124,131,232,0.35);
      --glass: rgba(8,8,24,0.75);
      --glass-border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.55);
      --font: 'Outfit', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #05050f;
      font-family: var(--font);
      color: var(--text);
      cursor: none;
    }

    canvas#c { display: block; position: fixed; inset: 0; }

    /* ═══ LOADER ═══ */
    #loader {
      position: fixed; inset: 0; z-index: 1000;
      background: #05050f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.8rem;
    }
    #loader.out { animation: loaderFadeOut 0.9s ease forwards; pointer-events: none; }
    @keyframes loaderFadeOut { to { opacity: 0; } }

    .ld-logo {
      font-size: 2.8rem; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: linear-gradient(135deg, #7c83e8 0%, #4ecdc4 50%, #ff9ff3 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoPulse 2s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { filter: brightness(1); }
      50%      { filter: brightness(1.3); }
    }
    .ld-sub {
      font-size: 0.78rem; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-dim); margin-top: -1rem;
    }
    .ld-phase {
      font-size: 0.75rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent);
      min-height: 1.2em;
    }
    .ld-track {
      width: 260px; height: 2px;
      background: rgba(255,255,255,0.08); border-radius: 1px; overflow: hidden;
    }
    .ld-fill {
      height: 100%; width: 0%; border-radius: 1px;
      background: linear-gradient(90deg, #7c83e8, #4ecdc4);
      transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    .ld-dots {
      display: flex; gap: 0.5rem;
    }
    .ld-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); opacity: 0.3;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .ld-dot:nth-child(2) { animation-delay: 0.2s; }
    .ld-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

    /* ═══ TOP BAR ═══ */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(5,5,15,0.6) 0%, transparent 100%);
    }
    .brand {
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0; transition: opacity 0.5s;
    }
    .brand span { font-weight: 300; opacity: 0.5; }

    #back-btn {
      pointer-events: all;
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 0.48rem 1.1rem; border-radius: 30px;
      font-family: var(--font); font-size: 0.8rem; font-weight: 500;
      cursor: none; text-decoration: none;
      transition: background 0.25s, border-color 0.25s;
      opacity: 0;
    }
    #back-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.28); }

    /* ═══ HINT ═══ */
    #hint {
      position: fixed; bottom: 2.2rem; left: 50%;
      transform: translateX(-50%);
      z-index: 100; text-align: center;
      pointer-events: none; opacity: 0;
      transition: opacity 0.6s;
    }
    .hint-icon { font-size: 1.4rem; display: block; animation: hintBob 2.2s ease-in-out infinite; }
    .hint-text { margin-top: 0.35rem; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: #000000; }
    @keyframes hintBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    /* ═══ SOUND BTN ═══ */
    #sound-btn {
      position: fixed; bottom: 1.4rem; right: 1.5rem; z-index: 100;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: var(--text); font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: none; opacity: 0; transition: background 0.25s, opacity 0.5s;
    }
    #sound-btn:hover { background: rgba(255,255,255,0.15); }

    /* ═══ ZONE LABELS ═══ */
    #zone-labels { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    .zl {
      position: absolute; transform: translate(-50%,-50%);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      opacity: 0; transition: opacity 0.4s;
      pointer-events: all; cursor: none;
    }
    .zl.visible { opacity: 1; }
    .zl-pin {
      width: 42px; height: 42px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: transform 0.22s, box-shadow 0.22s, background 0.22s;
    }
    .zl:hover .zl-pin, .zl.hovered .zl-pin {
      transform: scale(1.25);
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 22px rgba(255,255,255,0.35);
    }
    .zl-name {
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(5,5,15,0.72);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.18rem 0.6rem; border-radius: 12px; white-space: nowrap;
    }

    /* ═══ INFO PANEL ═══ */
    #info-panel {
      position: fixed; top: 50%; right: -440px;
      transform: translateY(-50%);
      z-index: 200; width: 400px; max-height: 88vh;
      overflow-y: auto;
      background: rgba(5,5,18,0.82);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px; padding: 2rem 1.8rem 1.8rem;
      transition: right 0.65s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    #info-panel.open { right: 1.4rem; }
    #info-panel::-webkit-scrollbar { width: 3px; }
    #info-panel::-webkit-scrollbar-track { background: transparent; }
    #info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 2px; }

    .p-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent; color: var(--text);
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      cursor: none; transition: background 0.2s;
    }
    .p-close:hover { background: rgba(255,255,255,0.1); }

    .p-section {
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .p-title { font-size: 1.35rem; font-weight: 700; line-height: 1.25; color: #fff; margin-bottom: 0.3rem; }
    .p-subtitle { font-size: 0.8rem; color: var(--text-dim); font-weight: 400; line-height: 1.5; margin-bottom: 1.1rem; }
    .p-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 1rem 0; }
    .p-body { font-size: 0.86rem; line-height: 1.75; color: rgba(255,255,255,0.72); margin-bottom: 1.1rem; }
    .p-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.4rem; }
    .p-tag {
      background: rgba(124,131,232,0.14); color: #a0a8ff;
      border: 1px solid rgba(124,131,232,0.25); border-radius: 20px;
      padding: 0.22rem 0.75rem; font-size: 0.73rem; font-weight: 600;
    }
    .p-ctas { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .p-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(124,131,232,0.18);
      border: 1px solid rgba(124,131,232,0.35);
      color: #fff; padding: 0.62rem 1.3rem; border-radius: 30px;
      font-family: var(--font); font-size: 0.82rem; font-weight: 600;
      cursor: none; text-decoration: none;
      transition: background 0.22s, transform 0.22s;
    }
    .p-btn:hover { background: rgba(124,131,232,0.35); transform: translateY(-2px); }

    /* ═══ CURSOR ═══ */
    #cursor { position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none; }
    #c-dot {
      position: absolute; width: 7px; height: 7px;
      background: #fff; border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: transform 0.12s, width 0.2s, height 0.2s;
    }
    #c-ring {
      position: absolute; width: 34px; height: 34px;
      border: 1.5px solid rgba(255,255,255,0.45); border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width 0.28s, height 0.28s, border-color 0.28s, transform 0.18s;
    }
    body.chover #c-dot { transform: translate(-50%,-50%) scale(0); }
    body.chover #c-ring {
      width: 52px; height: 52px;
      border-color: rgba(255,255,255,0.9);
      mix-blend-mode: difference;
    }

    /* ═══ COMPASS ═══ */
    #compass {
      position: fixed; bottom: 1.4rem; left: 1.5rem; z-index: 100;
      width: 60px; height: 60px; opacity: 0;
      transition: opacity 0.5s;
    }
    #compass svg { width: 100%; height: 100%; }

    /* ═══ MOBILE ═══ */
    @media (max-width: 768px) {
      #info-panel { width: calc(100vw - 2rem); right: -120%; top: auto; bottom: 0; transform: none; border-radius: 22px 22px 0 0; max-height: 60vh; }
      #info-panel.open { right: 0; bottom: 0; }
      body { cursor: auto; }
      #cursor { display: none; }
    }
  </style>
</head>

  // ──────────────────── NOISE / MATH UTILS ────────────────────
  function hash(n) { const s = Math.sin(n) * 43758.5453; return s - Math.floor(s); }
  function n2D(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x-ix, fy = y-iy;
    const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
    const a = hash(ix + iy*157), b = hash(ix+1 + iy*157);
    const c = hash(ix + (iy+1)*157), d = hash(ix+1 + (iy+1)*157);
    return a + (b-a)*ux + (c-a)*uy + (d-a-c+b)*ux*uy;
  }
  function fbm(x, y) { return n2D(x,y)*0.5 + n2D(x*2,y*2)*0.25 + n2D(x*4,y*4)*0.125; }
  function ss(a, b, x) { const t = Math.max(0, Math.min(1,(x-a)/(b-a))); return t*t*(3-2*t); }
  function lerp(a, b, t) { return a + (b-a)*t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // Terrain height at world (x,z)
  function terrH(x, z) {
    const r = Math.sqrt(x*x + z*z);
    const edge = 1 - ss(16, 26, r);
    return fbm(x*0.18 + 5.3, z*0.18 + 2.7) * 3.8 * edge + 0.4;
  }

  // ──────────────────── INIT ────────────────────
  function init() {
    // Renderer
    const canvas = document.getElementById('c');
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(innerWidth, innerHeight);

  // ──────────────────── SKY ────────────────────
  function makeSky() {
    const geo = new THREE.SphereGeometry(500, 32, 16);
    const mat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        uTime: uTime,
        uTop: { value: new THREE.Color(0x08123a) },
        uMid: { value: new THREE.Color(0x1a4080) },
        uBot: { value: new THREE.Color(0x3a7ab8) }
      },
      vertexShader: `
        varying vec3 vWP;
        void main(){
          vWP=(modelMatrix*vec4(position,1.0)).xyz;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
        }`,
      fragmentShader: `
        uniform vec3 uTop,uMid,uBot;
        uniform float uTime;
        varying vec3 vWP;
        void main(){
          float h=normalize(vWP).y;
          float t=max(h,0.0);
          float cycle=sin(uTime*0.06)*0.5+0.5;
          vec3 col=mix(uBot,uMid,t);
          col=mix(col,uTop,t*t);
          col+=cycle*0.04*(1.0-t);
          // Stars
          float star=step(0.998,fract(sin(dot(normalize(vWP),vec3(12.9898,78.233,45.164)))*43758.5453));
          col+=star*max(h,0.0)*0.9;
          gl_FragColor=vec4(col,1.0);
        }`
    });
    scene.add(new THREE.Mesh(geo, mat));
  }

  // ──────────────────── WATER ────────────────────
  function makeWater() {
    const geo = new THREE.PlaneGeometry(600, 600, 64, 64);
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false,
      uniforms: { uTime },
      vertexShader:`
        uniform float uTime;
        varying vec2 vUv;
        varying float vH;
        void main(){
          vUv=uv;
          vec3 p=position;
          p.z+=sin(p.x*0.45+uTime*0.9)*0.4;
          p.z+=cos(p.y*0.38+uTime*0.7)*0.3;
          p.z+=sin(p.x*0.9+p.y*0.7+uTime*1.2)*0.15;
          vH=p.z;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);
        }`,
      fragmentShader:`
        uniform float uTime;
        varying vec2 vUv;
        varying float vH;
        void main(){
          vec3 deep=vec3(0.03,0.12,0.30);
          vec3 mid =vec3(0.08,0.28,0.55);
          vec3 shal=vec3(0.18,0.50,0.75);
          float w=(vH+0.75)/1.5;
          vec3 col=mix(deep,mid,clamp(w,0.0,1.0));
          col=mix(col,shal,clamp(w-0.5,0.0,1.0)*2.0);
          // sparkle lines
          float s=sin(vUv.x*120.0+uTime*6.0)*sin(vUv.y*90.0+uTime*4.5);
          col+=pow(max(s,0.0),3.0)*0.3;
          // foam near island (not truly per-vertex but radius fade)
          float d=length(vUv-0.5)*2.0;
          col=mix(col,vec3(0.7,0.85,1.0),clamp((0.18-d)*8.0,0.0,0.12));
          gl_FragColor=vec4(col,0.87);
        }`
    });
    const water = new THREE.Mesh(geo, mat);
    water.rotation.x = -Math.PI/2;
    water.position.y = -2.8;
    scene.add(water);
  }

  // ──────────────────── ISLAND ────────────────────
  function makeIsland() {
    // === TERRAIN TOP ===
    const tGeo = new THREE.CylinderGeometry(27, 27, 1.0, 72, 14);
    const tPos = tGeo.attributes.position;
    const cols = new Float32Array(tPos.count * 3);

    for (let i = 0; i < tPos.count; i++) {
      const x = tPos.getX(i), yv = tPos.getY(i), z = tPos.getZ(i);
      if (yv > 0) {
        const h = terrH(x, z);
        tPos.setY(i, h);
        const r = Math.sqrt(x*x+z*z);
        const isEdge = r > 22;
        // Color variation
        if (h < 0.9 || isEdge) {
          cols[i*3]=0.40; cols[i*3+1]=0.30; cols[i*3+2]=0.18; // dirt
        } else if (h > 2.8) {
          cols[i*3]=0.28; cols[i*3+1]=0.42; cols[i*3+2]=0.18; // dark grass
        } else {
          const g = 0.35 + fbm(x*0.8,z*0.8)*0.15;
          cols[i*3]=g*0.55; cols[i*3+1]=g; cols[i*3+2]=g*0.35; // varied green
        }
      } else {
        cols[i*3]=0.36; cols[i*3+1]=0.26; cols[i*3+2]=0.16;
      }
    }
    tGeo.computeVertexNormals();
    tGeo.setAttribute('color', new THREE.BufferAttribute(cols, 3));

    const tMat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.92, metalness:0 });
    const terrain = new THREE.Mesh(tGeo, tMat);
    terrain.receiveShadow = true;
    scene.add(terrain);

    // === BODY ===
    const bGeo = new THREE.CylinderGeometry(26.5, 17, 12, 56, 4);
    const bMat = new THREE.MeshStandardMaterial({ color:0x503820, roughness:1, metalness:0 });
    const body  = new THREE.Mesh(bGeo, bMat);
    body.position.y = -6; body.castShadow = true; body.receiveShadow = true;
    scene.add(body);

    // === ROCK BOTTOM ===
    const rGeo = new THREE.CylinderGeometry(17, 11, 5, 8, 2);
    const rMat = new THREE.MeshStandardMaterial({ color:0x2e1e10, roughness:1 });
    const rock  = new THREE.Mesh(rGeo, rMat);
    rock.position.y = -12.5; scene.add(rock);

    // === EDGE PATH ===
    const pGeo = new THREE.RingGeometry(23, 27, 72, 1);
    pGeo.rotateX(-Math.PI/2);
    const pMat = new THREE.MeshStandardMaterial({ color:0x7a5c3a, roughness:1 });
    const path  = new THREE.Mesh(pGeo, pMat);
    path.position.y = 0.5; path.receiveShadow = true;
    scene.add(path);
  }

  // ──────────────────── TREES (InstancedMesh) ────────────────────
  function makeTrees() {
    const mobile = innerWidth < 768;
    const COUNT = mobile ? 30 : 75;

    const f1Geo = new THREE.ConeGeometry(0.72, 1.45, 7);
    f1Geo.translate(0, 0.725, 0);
    const f2Geo = new THREE.ConeGeometry(0.52, 1.15, 7);
    f2Geo.translate(0, 1.6, 0);
    const tGeo  = new THREE.CylinderGeometry(0.065, 0.11, 0.75, 5);
    tGeo.translate(0, 0.375, 0);

    const f1Mat = new THREE.MeshStandardMaterial({ color:0x2d6930, roughness:0.88 });
    const f2Mat = new THREE.MeshStandardMaterial({ color:0x3a7a3d, roughness:0.88 });
    const tMat  = new THREE.MeshStandardMaterial({ color:0x5c3a1e, roughness:1.0 });

    trees.fi  = new THREE.InstancedMesh(f1Geo, f1Mat, COUNT);
    trees.fi2 = new THREE.InstancedMesh(f2Geo, f2Mat, COUNT);
    trees.ti  = new THREE.InstancedMesh(tGeo,  tMat,  COUNT);
    trees.fi.castShadow = trees.fi2.castShadow = true;
    trees.fi.receiveShadow = true;

    // Avoid zone centers
    const avoid = ZONES.map(z => ({ x:z.pos[0], z:z.pos[1], r:5.0 }));

    let placed = 0, tries = 0;
    while (placed < COUNT && tries < COUNT * 25) {
      tries++;
      const ang = Math.random() * Math.PI * 2;
      const rad = 2.5 + Math.random() * 22;
      const x   = Math.cos(ang) * rad;
      const z   = Math.sin(ang) * rad;

      let skip = false;
      for (const av of avoid) {
        if (Math.hypot(x-av.x, z-av.z) < av.r) { skip=true; break; }
      }
      if (skip) continue;

      const y  = terrH(x, z);
      const s  = 0.55 + Math.random() * 0.9;
      const ph = Math.random() * Math.PI * 2;
      const tilt = (Math.random()-0.5) * 0.1;
      trees.data.push({ x, y, z, s, ph, tilt });

      _eu.set(tilt, Math.random()*Math.PI*2, 0);
      _q.setFromEuler(_eu);
      _v3.set(x, y, z); _sc.set(s,s,s);
      _m4.compose(_v3, _q, _sc);

      trees.fi.setMatrixAt(placed, _m4);
      trees.fi2.setMatrixAt(placed, _m4);
      trees.ti.setMatrixAt(placed, _m4);
      placed++;
    }

    trees.fi.instanceMatrix.needsUpdate  = true;
    trees.fi2.instanceMatrix.needsUpdate = true;
    trees.ti.instanceMatrix.needsUpdate  = true;

    scene.add(trees.fi, trees.fi2, trees.ti);
  }

  // Called each frame
  function swayTrees(t) {
    if (!trees.fi) return;
    for (let i = 0; i < trees.data.length; i++) {
      const d  = trees.data[i];
      const sw = Math.sin(t * 0.85 + d.ph) * 0.048;
      const swz= Math.cos(t * 0.65 + d.ph) * 0.03;
      _eu.set(sw + d.tilt, 0, swz);
      _q.setFromEuler(_eu);
      _v3.set(d.x, d.y, d.z); _sc.set(d.s, d.s, d.s);
      _m4.compose(_v3, _q, _sc);
      trees.fi.setMatrixAt(i, _m4);
      trees.fi2.setMatrixAt(i, _m4);
      trees.ti.setMatrixAt(i, _m4);
    }
    trees.fi.instanceMatrix.needsUpdate  = true;
    trees.fi2.instanceMatrix.needsUpdate = true;
    trees.ti.instanceMatrix.needsUpdate  = true;
  }

  // Helper to create invisible but raycastable zone colliders
  function addZoneCollider(grp, zoneIndex, radius, height) {
    const geo = new THREE.CylinderGeometry(radius, radius, height, 16);
    geo.translate(0, height / 2, 0);
    const mat = new THREE.MeshBasicMaterial({
      colorWrite: false,
      depthWrite: false
    });
    const collider = new THREE.Mesh(geo, mat);
    collider.userData.zoneIndex = zoneIndex;
    collider.userData.isZone = true;
    grp.add(collider);
    hitList.push(collider);
  }

    const orbM = new THREE.MeshStandardMaterial({ color:z.col, emissive:z.em, emissiveIntensity:0.75, roughness:0.15, metalness:0.85 });
    const orb  = new THREE.Mesh(new THREE.SphereGeometry(0.78, 26, 26), orbM);
    orb.position.y = 2.6; orb.castShadow = true;
    orb.userData.zoneIndex=4; orb.userData.isZone=true; hitList.push(orb);
    grp.add(orb);

    // Orbiting books
    const bkCols = [0xffe66d, 0xffa07a, 0xdda0dd, 0x98d8a8];
    for (let i=0; i<4; i++) {
      const bkGrp = new THREE.Group();
      const bkM  = new THREE.MeshStandardMaterial({ color:bkCols[i], emissive:bkCols[i], emissiveIntensity:0.15, roughness:0.75 });
      bkGrp.add(new THREE.Mesh(new THREE.BoxGeometry(0.72,0.08,0.95), bkM));
      // Spine
      const spM = new THREE.MeshStandardMaterial({ color:0x222 });
      const sp  = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.1,0.95), spM);
      sp.position.x = -0.36; bkGrp.add(sp);

      const ang0 = (i/4)*Math.PI*2;
      bkGrp.position.set(Math.cos(ang0)*2.0, 2.6+Math.sin(i*1.3)*0.35, Math.sin(ang0)*2.0);
      grp.add(bkGrp);
      orbits.push({ grp:bkGrp, r:2.0, ph:ang0, speed:0.38+i*0.04, baseY:2.6 });
    }

    // Aura particles
    const pG = new THREE.BufferGeometry();
    const pP = new Float32Array(100*3);
    for (let i=0; i<100; i++) {
      const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI, rr=1.0+Math.random()*0.9;
      pP[i*3]=Math.sin(ph)*Math.cos(th)*rr; pP[i*3+1]=2.6+Math.cos(ph)*rr; pP[i*3+2]=Math.sin(ph)*Math.sin(th)*rr;
    }
    pG.setAttribute('position', new THREE.BufferAttribute(pP,3));
    const pM = new THREE.PointsMaterial({ color:z.col, size:0.07, transparent:true, opacity:0.85, blending:THREE.AdditiveBlending, depthWrite:false });
    grp.add(new THREE.Points(pG, pM));

    addZoneCollider(grp, 4, 3.2, 4.5);
    scene.add(grp);
    zoneObjs.push({ grp, main:orb, basePY:2.6 });
  }

  // ──────────────────── DISTRICT: CONTACT (Cabin) ────────────────────
  function makeContact() {
    const z = ZONES[5];
    const [x, zz] = z.pos, y = terrH(x,zz);
    const grp = new THREE.Group();
    grp.position.set(x, y, zz);

    const cabM  = new THREE.MeshStandardMaterial({ color:0xc8a070, roughness:0.9 });
    const roofM = new THREE.MeshStandardMaterial({ color:0x7a3a18, roughness:0.9 });

    // Body
    const cab = new THREE.Mesh(new THREE.BoxGeometry(3.0, 2.2, 2.6), cabM);
    cab.position.y = 1.1; cab.castShadow=true; grp.add(cab);

    // Roof
    const rfM = new THREE.Mesh(new THREE.CylinderGeometry(0.08,2.2,1.6,4), roofM);
    rfM.position.y = 3.0; rfM.rotation.y=Math.PI/4; rfM.castShadow=true; grp.add(rfM);

    // Chimney
    const chim = new THREE.Mesh(new THREE.BoxGeometry(0.35,1.3,0.35), new THREE.MeshStandardMaterial({color:0x6a4a3a, roughness:1}));
    chim.position.set(0.65, 3.25, 0.4); chim.castShadow=true; grp.add(chim);

    // Door
    const door = new THREE.Mesh(new THREE.BoxGeometry(0.58,0.95,0.05), new THREE.MeshStandardMaterial({color:0x5c3a1e,roughness:0.9}));
    door.position.set(0, 0.48, 1.33); grp.add(door);

    // Glowing windows
    const glowWM = new THREE.MeshStandardMaterial({ color:0xffcc55, emissive:0xff9911, emissiveIntensity:0.9, roughness:0.1 });
    for (const wx of [-0.9,0.9]) {
      const win = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.55,0.05), glowWM);
      win.position.set(wx, 1.25, 1.33); grp.add(win);
    }

    // Mailbox (main interactable)
    const mbM  = new THREE.MeshStandardMaterial({ color:z.col, emissive:z.em, emissiveIntensity:0.4, roughness:0.5, metalness:0.3 });
    const mbox = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.28,0.5), mbM);
    mbox.position.set(1.9, 0.72, 0.7); mbox.castShadow=true;
    mbox.userData.zoneIndex=5; mbox.userData.isZone=true; hitList.push(mbox);
    grp.add(mbox);

    // Post
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.72,4), new THREE.MeshStandardMaterial({color:0x555}));
    post.position.set(1.9, 0.36, 0.7); grp.add(post);

    // Smoke particles
    const smokeG = new THREE.BufferGeometry();
    const smP = new Float32Array(24*3), smPh = new Float32Array(24);
    for (let i=0; i<24; i++) {
      smP[i*3]=0.65; smP[i*3+1]=3.9+(i/24)*2.2; smP[i*3+2]=0.4;
      smPh[i]=Math.random()*Math.PI*2;
    }
    smokeG.setAttribute('position',new THREE.BufferAttribute(smP,3));
    smokeG.setAttribute('phase',   new THREE.BufferAttribute(smPh,1));
    const smokePs = new THREE.Points(smokeG, new THREE.PointsMaterial({
      color:0xaaaaaa, size:0.35, transparent:true, opacity:0.3,
      blending:THREE.AdditiveBlending, depthWrite:false
    }));
    smokePs.userData.smoke = true;
    grp.add(smokePs);

    addZoneCollider(grp, 5, 3.2, 4.0);
    scene.add(grp);
    zoneObjs.push({ grp, main:mbox, basePY:0.72, smoke:smokePs });
  }

  // ──────────────────── CLOUDS ────────────────────
  function makeClouds() {
    const cMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:1, transparent:true, opacity:0.9 });
    for (let c=0; c<14; c++) {
      const grp = new THREE.Group();
      const nS = 4 + Math.floor(Math.random()*4);
      for (let s=0; s<nS; s++) {
        const r = 0.9 + Math.random() * 1.6;
        const m = new THREE.Mesh(new THREE.SphereGeometry(r,7,5), cMat);
        m.position.set((Math.random()-0.5)*4, (Math.random()-0.5)*1.2, (Math.random()-0.5)*2.6);
        grp.add(m);
      }
      const ang = (c/14)*Math.PI*2 + Math.random()*0.5;
      const rad = 22 + Math.random()*32;
      grp.position.set(Math.cos(ang)*rad, 18+Math.random()*16, Math.sin(ang)*rad);
      const sc = 0.75 + Math.random()*1.5;
      grp.scale.set(sc, sc*0.45, sc);
      grp.userData = { spd: 0.25+Math.random()*0.55, ang, rad, yOff:Math.random()*2 };
      scene.add(grp); clouds.push(grp);
    }
  }

  // ──────────────────── BIRDS ────────────────────
  function makeBirds() {
    const bMat = new THREE.MeshStandardMaterial({ color:0x1a1a28, roughness:1, side:THREE.DoubleSide });
    for (let i=0; i<10; i++) {
      const grp = new THREE.Group();
      // Wing shape
      const shape = new THREE.Shape();
      shape.moveTo(0,0); shape.lineTo(0.75,0.28); shape.lineTo(0,0.08); shape.lineTo(-0.75,0.28); shape.lineTo(0,0);
      const bGeo = new THREE.ShapeGeometry(shape);
      const bMesh = new THREE.Mesh(bGeo, bMat);
      bMesh.rotation.x = -Math.PI/2; grp.add(bMesh);

      const ang = (i/10)*Math.PI*2;
      const rad = 14+Math.random()*22;
      grp.position.set(Math.cos(ang)*rad, 24+Math.random()*10, Math.sin(ang)*rad);
      grp.userData = { spd:0.35+Math.random()*0.65, ang, rad, yBase:grp.position.y, fp:Math.random()*Math.PI*2 };
      scene.add(grp); birds.push(grp);
    }
  }

  // ──────────────────── PARTICLES ────────────────────
  let particleSys, fireflySys;
  function makeParticles() {
    // Dust particles
    const pC = 1000;
    const pP = new Float32Array(pC*3), pPh = new Float32Array(pC);
    for (let i=0; i<pC; i++) {
      const a=Math.random()*Math.PI*2, r=Math.random()*34;
      pP[i*3]=Math.cos(a)*r; pP[i*3+1]=-2+Math.random()*22; pP[i*3+2]=Math.sin(a)*r;
      pPh[i]=Math.random()*Math.PI*2;
    }
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position',new THREE.BufferAttribute(pP,3));
    pGeo.setAttribute('phase',   new THREE.BufferAttribute(pPh,1));
    particleSys = new THREE.Points(pGeo, new THREE.PointsMaterial({
      color:0xffffff, size:0.045, transparent:true, opacity:0.45,
      blending:THREE.AdditiveBlending, depthWrite:false
    }));
    scene.add(particleSys);

    // Fireflies
    const fC = 70;
    const fP = new Float32Array(fC*3), fPh = new Float32Array(fC);
    for (let i=0; i<fC; i++) {
      const a=Math.random()*Math.PI*2, r=Math.random()*22;
      fP[i*3]=Math.cos(a)*r; fP[i*3+1]=0.4+Math.random()*5.5; fP[i*3+2]=Math.sin(a)*r;
      fPh[i]=Math.random()*Math.PI*2;
    }
    const fGeo = new THREE.BufferGeometry();
    fGeo.setAttribute('position',new THREE.BufferAttribute(fP,3));
    fGeo.setAttribute('phase',   new THREE.BufferAttribute(fPh,1));
    fireflySys = new THREE.Points(fGeo, new THREE.PointsMaterial({
      color:0x88ff44, size:0.14, transparent:true, opacity:0.9,
      blending:THREE.AdditiveBlending, depthWrite:false
    }));
    scene.add(fireflySys);
  }

  // ──────────────────── ZONE LABELS ────────────────────
  function buildLabels() {
    const cont = document.getElementById('zone-labels');
    ZONES.forEach((z, i) => {
      const el = document.createElement('div');
      el.className = 'zl';
      el.dataset.zone = i;
      el.innerHTML = `<div class="zl-pin" data-zone="${i}">${z.icon}</div><div class="zl-name">${z.label}</div>`;
      cont.appendChild(el);
      labelEls.push(el);
    });
    // Click
    cont.addEventListener('click', e => {
      const pin = e.target.closest('[data-zone]');
      if (pin) flyTo(+pin.dataset.zone);
    });
  }

  function tickLabels() {
    ZONES.forEach((z, i) => {
      const zo = zoneObjs[i];
      if (!zo) return;
      const wp = new THREE.Vector3();
      zo.grp.getWorldPosition(wp);
      wp.y += 4.5;
      const p  = wp.clone().project(camera);
      const sx = (p.x*0.5+0.5)*innerWidth;
      const sy = (-p.y*0.5+0.5)*innerHeight;
      const el = labelEls[i];
      if (!el) return;
      if (p.z > 1 || selZ !== -1) { el.style.opacity='0'; return; }
      el.style.left = sx+'px'; el.style.top = sy+'px';
      el.classList.toggle('visible', true);
      el.querySelector('.zl-pin').classList.toggle('hovered', hovZ===i);
    });
  }

  // ──────────────────── CAMERA ────────────────────
  function updateCamera() {
    const T = 0.072;
    cam.th += (cam.tTh - cam.th) * T;
    cam.ph += (cam.tPh - cam.ph) * T;
    cam.r  += (cam.tR  - cam.r)  * T;
    cam.lk.lerp(cam.tlk, T);

    // Breathing (idle only)
    const breath = selZ === -1 ? Math.sin(elapsed*0.38)*0.28 : 0;

    const px = cam.r * Math.sin(cam.ph) * Math.sin(cam.th);
    const py = cam.r * Math.cos(cam.ph) + breath;
    const pz = cam.r * Math.sin(cam.ph) * Math.cos(cam.th);

    camera.position.set(cam.lk.x+px, cam.lk.y+py, cam.lk.z+pz);
    camera.lookAt(cam.lk);
  }

  // ──────────────────── FLY TO ZONE ────────────────────
  function flyTo(idx) {
    if (selZ === idx) return;

    // Save current state
    savedCam = { th:cam.tTh, ph:cam.tPh, r:cam.tR, lk:cam.tlk.clone() };

    selZ    = idx;
    autoRot = false;
    clearTimeout(autoRotTimer);

    const z  = ZONES[idx];
    const zo = zoneObjs[idx];
    const wp = new THREE.Vector3();
    zo.grp.getWorldPosition(wp);
    const look = wp.clone(); look.y += 1.0;

    gsap.killTweensOf(cam);
    gsap.killTweensOf(cam.tlk);

    gsap.timeline()
      .to(cam.tlk, { x:look.x, y:look.y, z:look.z, duration:1.6, ease:'power3.inOut' }, 0)
      .to(cam,     {
        tTh: cam.tTh + z.camTh * 0.8,
        tPh: z.camPh,
        tR:  z.camR,
        duration:1.6, ease:'power3.inOut',
        onComplete: () => openPanel(idx)
      }, 0);

    playClick();
  }

  function returnHome() {
    if (!savedCam) return;
    closePanel();
    selZ = -1;

    const sc = savedCam;
    gsap.timeline()
      .to(cam.tlk, { x:sc.lk.x, y:sc.lk.y, z:sc.lk.z, duration:1.3, ease:'power2.inOut' }, 0)
      .to(cam,     {
        tTh: sc.th, tPh: sc.ph, tR: sc.r,
        duration:1.3, ease:'power2.inOut',
        onComplete: () => { autoRot=true; savedCam=null; }
      }, 0);
  }

  // ──────────────────── PANEL ────────────────────
  function openPanel(idx) {
    const z = ZONES[idx];
    document.getElementById('p-section').textContent  = z.section;
    document.getElementById('p-title').textContent    = z.title;
    document.getElementById('p-subtitle').textContent = z.subtitle;
    document.getElementById('p-body').textContent     = z.body;

    const tagsEl = document.getElementById('p-tags');
    tagsEl.innerHTML = '';
    z.tags.forEach(t => {
      const s = document.createElement('span'); s.className='p-tag'; s.textContent=t;
      tagsEl.appendChild(s);
    });

    const ctasEl = document.getElementById('p-ctas');
    ctasEl.innerHTML = '';
    z.ctas.forEach(cta => {
      const a = document.createElement('a');
      a.className='p-btn'; a.href=cta.href; a.target='_blank'; a.rel='noopener';
      a.textContent = cta.label+' →';
      ctasEl.appendChild(a);
    });

    // Tint accent
    const hex = '#' + z.col.toString(16).padStart(6,'0');
    document.documentElement.style.setProperty('--accent', hex);
    document.documentElement.style.setProperty('--accent-glow', hex+'44');

    document.getElementById('info-panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('info-panel').classList.remove('open');
    document.documentElement.style.setProperty('--accent','#7c83e8');
  }

  // ──────────────────── RAYCASTING ────────────────────
  function doRaycast() {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(hitList, false);
    if (hits.length > 0) {
      const zi = hits[0].object.userData.zoneIndex;
      if (hovZ !== zi) { hovZ=zi; document.body.classList.add('chover'); playHover(); }
    } else {
      if (hovZ !== -1) { hovZ=-1; document.body.classList.remove('chover'); }
    }
  }

  // ──────────────────── CURSOR ────────────────────
  function tickCursor() {
    cRX += (cX-cRX) * 0.14;
    cRY += (cY-cRY) * 0.14;
    const cur = document.getElementById('cursor');
    cur.style.transform = `translate(${cX}px,${cY}px)`;
    document.getElementById('c-ring').style.transform = `translate(calc(${cRX-cX}px - 50%),calc(${cRY-cY}px - 50%))`;
  }

  // ──────────────────── MOMENTUM ────────────────────
  function applyMomentum() {
    const tick = () => {
      cam.vTh *= 0.91; cam.vPh *= 0.91;
      cam.tTh += cam.vTh; cam.tPh = clamp(cam.tPh+cam.vPh, 0.2, 1.45);
      if (Math.abs(cam.vTh)>0.0004 || Math.abs(cam.vPh)>0.0004)
        requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  // ──────────────────── SOUND ────────────────────
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function tone(f, dur, vol=0.08, type='sine') {
    if (!soundOn || !audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }
  function playHover() { tone(520+Math.random()*180, 0.12, 0.04); }
  function playClick() { tone(523,0.25,0.1); tone(659,0.3,0.07); }
  // Ambient wind (white noise loop)
  let windNode = null;
  function startWind() {
    if (!soundOn||!audioCtx||windNode) return;
    const bufSize=audioCtx.sampleRate*2;
    const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1);
    windNode=audioCtx.createBufferSource();
    windNode.buffer=buf; windNode.loop=true;
    const f=audioCtx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=400;
    const g=audioCtx.createGain(); g.gain.value=0.03;
    windNode.connect(f); f.connect(g); g.connect(audioCtx.destination);
    windNode.start();
  }

  // ──────────────────── COMPASS ────────────────────
  function tickCompass() {
    const n = document.getElementById('compass-n');
    if (n) n.style.transform = `rotate(${-cam.th * 180/Math.PI}deg)`;
    document.getElementById('compass').style.transform = `translateZ(0)`;
  }

  // ──────────────────── MAIN LOOP ────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    elapsed += dt;
    uTime.value = elapsed;

    // Auto-rotate
    if (autoRot && !dragging && selZ===-1) {
      cam.tTh += 0.003 * Math.min(dt*60, 2);
    }

    updateCamera();
    if (!dragging) doRaycast();
    tickLabels();
    tickCursor();
    tickCompass();

    // Tree sway
    swayTrees(elapsed);

    // Clouds
    clouds.forEach(c => {
      c.userData.ang += c.userData.spd * 0.0028;
      c.position.x = Math.cos(c.userData.ang)*c.userData.rad;
      c.position.z = Math.sin(c.userData.ang)*c.userData.rad;
      c.position.y = 18 + c.userData.yOff + Math.sin(elapsed*0.12+c.userData.yOff)*1.8;
    });

    // Birds
    birds.forEach(b => {
      b.userData.ang += b.userData.spd * 0.009;
      const a=b.userData.ang, r=b.userData.rad;
      b.position.x = Math.cos(a)*r;
      b.position.z = Math.sin(a)*r;
      b.position.y = b.userData.yBase + Math.sin(elapsed*2.2+b.userData.fp)*1.8;
      b.rotation.y = -a + Math.PI/2;
      if(b.children[0]) b.children[0].rotation.z = Math.sin(elapsed*9+b.userData.fp)*0.45;
    });

    // Orbiting books
    orbits.forEach(ob => {
      ob.ph += ob.speed * 0.009;
      ob.grp.position.x = Math.cos(ob.ph)*ob.r;
      ob.grp.position.z = Math.sin(ob.ph)*ob.r;
      ob.grp.position.y = ob.baseY + Math.sin(elapsed*0.75+ob.ph)*0.3;
      ob.grp.rotation.y = ob.ph + Math.PI;
      ob.grp.rotation.x = Math.sin(elapsed*0.55+ob.ph)*0.18;
    });

    // Zone object animations
    zoneObjects_tick(elapsed);

    // Fireflies
    if (fireflySys) {
      const fp = fireflySys.geometry.attributes.position;
      const fph= fireflySys.geometry.attributes.phase;
      for (let i=0; i<fp.count; i++) {
        const p=fph.getX(i);
        fp.setX(i, fp.getX(i) + Math.sin(elapsed*0.5+p*1.8)*0.012);
        fp.setZ(i, fp.getZ(i) + Math.cos(elapsed*0.4+p*2.2)*0.012);
        fp.setY(i, 0.4 + (Math.abs(p*1.618)%5.5) + Math.sin(elapsed*1.6+p)*0.9);
      }
      fp.needsUpdate = true;
      fireflySys.material.opacity = 0.5 + Math.sin(elapsed*3)*0.4;
    }

    // Particles drift
    if (particleSys) particleSys.rotation.y = elapsed*0.015;

    renderer.render(scene, camera);
  }

  // ──────────────────── ZONE TICK ────────────────────
  function zoneObjects_tick(t) {
    zoneObjs.forEach((zo, i) => {
      if (!zo) return;
      // Crystal hover (main mesh)
      if (zo.main) {
        zo.main.position.y = zo.basePY + Math.sin(t*0.6+i)*0.14;
      }
      // Rings spin (Home)
      zo.grp.children.forEach(ch => {
        if (ch.userData.ring !== undefined) {
          ch.rotation.x += 0.01 + ch.userData.ring*0.005;
          ch.rotation.z += 0.007 + ch.userData.ring*0.003;
        }
      });
      // Train move (Experience)
      if (zo.train) {
        const ta = t*0.55;
        zo.train.position.x = Math.sin(ta)*2.5 - 0.4;
        zo.train.position.z = -1.9;
        zo.train.rotation.y = (Math.sin(ta) > 0) ? 0 : Math.PI;
      }
      // Smoke drift (Contact)
      if (zo.smoke) {
        const sp = zo.smoke.geometry.attributes.position;
        const sph= zo.smoke.geometry.attributes.phase;
        for (let j=0; j<sp.count; j++) {
          const p=sph.getX(j);
          sp.setX(j, 0.65 + Math.sin(t*0.5+p)*0.15);
          sp.setY(j, 3.9 + ((j/sp.count)*2.4 + t*0.25 + p*0.1) % 2.4);
          sp.setZ(j, 0.4 + Math.cos(t*0.4+p)*0.12);
        }
        sp.needsUpdate=true;
        zo.smoke.material.opacity = 0.18 + Math.sin(t*0.9)*0.12;
      }
    });
  }

  // ──────────────────── EVENTS ────────────────────
  function setupEvents() {
    const cv = document.getElementById('c');

    // Mouse move
    window.addEventListener('mousemove', e => {
      cX = e.clientX; cY = e.clientY;
      mouse.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
      if (dragging) {
        const dx=e.clientX-prevMX, dy=e.clientY-prevMY;
        cam.tTh -= dx*0.005; cam.tPh = clamp(cam.tPh+dy*0.004, 0.2, 1.45);
        cam.vTh = -dx*0.005; cam.vPh = dy*0.004;
        prevMX=e.clientX; prevMY=e.clientY;
      }
    });

    cv.addEventListener('mousedown', e => {
      if (e.button!==0) return;
      dragging=true; prevMX=e.clientX; prevMY=e.clientY;
      cam.vTh=0; cam.vPh=0;
      autoRot=false; clearTimeout(autoRotTimer);
    });

    window.addEventListener('mouseup', () => {
      if(!dragging) return;
      dragging=false; applyMomentum();
      if(selZ===-1) {
        clearTimeout(autoRotTimer);
        autoRotTimer = setTimeout(()=>{autoRot=true;},3500);
      }
    });

    // Click
    cv.addEventListener('click', e => {
      if(Math.abs(cam.vTh)>0.008||Math.abs(cam.vPh)>0.008) return;
      raycaster.setFromCamera(mouse,camera);
      const hits=raycaster.intersectObjects(hitList,false);
      if(hits.length>0) flyTo(hits[0].object.userData.zoneIndex);
    });

    // Scroll = zoom
    cv.addEventListener('wheel', e => {
      e.preventDefault();
      cam.tR = clamp(cam.tR + e.deltaY*0.038, 14, 82);
      autoRot=false; clearTimeout(autoRotTimer);
      autoRotTimer=setTimeout(()=>{autoRot=true;},3500);
    }, {passive:false});

    // Close panel
    document.getElementById('p-close').addEventListener('click', returnHome);

    // Sound
    document.getElementById('sound-btn').addEventListener('click', () => {
      soundOn=!soundOn;
      document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
      if(soundOn){initAudio();startWind();}
      else if(windNode){windNode.stop();windNode=null;}
    });

    // Touch
    let tStart=null;
    cv.addEventListener('touchstart', e=>{
      const t=e.touches[0]; tStart={x:t.clientX,y:t.clientY};
      prevMX=t.clientX; prevMY=t.clientY;
      dragging=true; autoRot=false; cam.vTh=0; cam.vPh=0;
    },{passive:true});
    cv.addEventListener('touchmove', e=>{
      const t=e.touches[0];
      const dx=t.clientX-prevMX, dy=t.clientY-prevMY;
      cam.tTh-=dx*0.005; cam.tPh=clamp(cam.tPh+dy*0.004,0.2,1.45);
      cam.vTh=-dx*0.005; cam.vPh=dy*0.004;
      prevMX=t.clientX; prevMY=t.clientY;
    },{passive:true});
    cv.addEventListener('touchend', e=>{
      dragging=false; applyMomentum();
      if(tStart){
        const t=e.changedTouches[0];
        if(Math.hypot(t.clientX-tStart.x,t.clientY-tStart.y)<10){
          mouse.set((tStart.x/innerWidth)*2-1,-(tStart.y/innerHeight)*2+1);
          raycaster.setFromCamera(mouse,camera);
          const hits=raycaster.intersectObjects(hitList,false);
          if(hits.length>0) flyTo(hits[0].object.userData.zoneIndex);
        }
      }
      autoRotTimer=setTimeout(()=>{autoRot=true;},3500);
    });

    // Resize
    window.addEventListener('resize', ()=>{
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
  }

  // ──────────────────── LOADING SEQUENCE ────────────────────
  const PHASES = [
    {txt:'Generating terrain...',pct:18},
    {txt:'Planting trees...',    pct:36},
    {txt:'Building districts...', pct:55},
    {txt:'Waking the world...',  pct:72},
    {txt:'Summoning fireflies...', pct:88},
    {txt:'Ready ✦',             pct:100}
  ];

  function runLoader() {
    const loaderEl = document.getElementById('loader');
    const phaseEl  = document.getElementById('ld-phase');
    const fillEl   = document.getElementById('ld-fill');
    const brandEl  = document.getElementById('brand');
    const backEl   = document.getElementById('back-btn');
    const hintEl   = document.getElementById('hint');
    const soundEl  = document.getElementById('sound-btn');
    const compEl   = document.getElementById('compass');

    // Init + build world
    init();
    makeSky(); makeLights(); makeWater(); makeIsland();
    makeTrees();
    makeHome(); makeExperience(); makeSkills();
    makeProjects(); makeResearch(); makeContact();
    makeClouds(); makeBirds(); makeParticles();
    buildLabels(); setupEvents();

    // Start render loop immediately (low camera, smooth fly-in)
    cam.ph=0.22; cam.r=90; cam.tPh=0.62; cam.tR=50;
    animate();

    // Phase through loading
    let pi=0;
    const next = ()=>{
      if(pi>=PHASES.length){ doFlyIn(); return; }
      const p=PHASES[pi++];
      phaseEl.textContent=p.txt; fillEl.style.width=p.pct+'%';
      setTimeout(next, 550+Math.random()*250);
    };
    setTimeout(next, 300);

    function doFlyIn() {
      setTimeout(()=>{
        loaderEl.classList.add('out');
        setTimeout(()=>{ loaderEl.style.display='none'; },950);

        // Reveal UI with staggered fades
        gsap.to(brandEl,{ opacity:1, duration:0.9, delay:0.4 });
        gsap.to(backEl,  { opacity:1, duration:0.9, delay:0.6 });
        gsap.to(hintEl,  { opacity:1, duration:0.8, delay:1.0 });
        gsap.to(soundEl, { opacity:1, duration:0.8, delay:1.2 });
        gsap.to(compEl,  { opacity:0.85, duration:0.8, delay:1.4 });

        // Hide hint after 7s
        setTimeout(()=> gsap.to(hintEl,{opacity:0,duration:1.2}), 8000);
      }, 350);
    }
  }

  // ── GO ──
  runLoader();
  </script>
</body>
</html>
